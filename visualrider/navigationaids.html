<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Aids</title>
    <link rel="stylesheet" href="navigationaids.css">
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.9.1/mapbox-gl.css' rel='stylesheet' />
</head>
<body>
    <div class="container">
        <header>
            <h1>Navigation Aids</h1>
        </header>
        <main>
            <div id="map" class="map"></div>
            <div class="controls">
                <label for="current-location">Current Location:</label>
                <input type="text" id="current-location" placeholder="Enter current location" />
                
                <label for="destination">Destination:</label>
                <input type="text" id="destination" placeholder="Enter destination" />
                
                <button id="find-route-btn">Find Route</button>
                <p id="status-message"></p>
            </div>
        </main>
    </div>
    <script src="navigationaids.js"></script>
</body>
</html>
