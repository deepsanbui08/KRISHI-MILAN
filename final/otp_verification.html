<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="otp_verification.css">
</head>
<body>
    <div class="otp-container">
        <h2>OTP Verification</h2>
        <p>Please enter the OTP sent to your registered phone number.</p>
        <form id="otp-form">
            <input type="text" id="otp-input" maxlength="6" placeholder="Enter OTP" required>
            <button type="submit">Verify OTP</button>
        </form>
        <p id="message" class="message"></p>
        <div class="resend-container">
            <p>If you didn't receive the OTP, <span id="resend-btn" class="resend-link">click here to resend</span>.</p>
        </div>
    </div>
    <script src="otp_verification.js"></script>
</body>
</html>
