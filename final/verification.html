<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Complete</title>
    <link rel="stylesheet" href="verification.css">
    <style>
        /* General styles */
        body {
            font-family: 'Poppins', sans-serif; /* Use a modern, clean font */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Full height */
            background-color: #59f0cf; /* Light green background */
            color: #333;
        }

        #confirmation {
            text-align: center;
            background-color: rgba(200, 197, 197, 0.5); /* Light transparent background */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .tick {
            width: 120px; /* Adjusted width for better size */
            height: auto; /* Maintain aspect ratio */
            display: block; /* Center the image */
            margin: 0 auto 20px; /* Centering and margin below the image */
        }

        #back-home-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #5e79bd; /* Green background */
            color: white; /* White text */
            border: none;
            border-radius: 5px;
            margin-top: 20px; /* Space above the button */
            transition: background-color 0.3s;
        }

        #back-home-btn:hover {
            background-color: #244d98; /* Darker green on hover */
        }
    </style>
</head>
<body>
    <div id="confirmation">
        <img src="tick.png" alt="Success" class="tick">
        <h2>REGISTRATION DONE</h2>
        <p>You can now log in.</p>

        <!-- Back to Home Button -->
        <button id="back-home-btn">Back to Home</button>
    </div>

    <script>
        // Redirect to user_page.html when the button is clicked
        document.getElementById('back-home-btn').addEventListener('click', function() {
            window.location.href = 'user_page.html'; // Redirect to user page
        });
    </script>
</body>
</html>
